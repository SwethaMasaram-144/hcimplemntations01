<template>
    <template if:true={showPopup}>
        <div class = "modal-backdrop slds-backdrop slds-backdrop_open"></div>
        <div class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closePopup}>
                        <lightning-icon icon-name="utility:close"
                              alternative-text="close"
                              size="small"></lightning-icon>
                           <span class="slds-assistive-text">Close</span>
                    </button>
                    <p style="font-size: x-large;">Select Care Team for Appointment</p>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <!-- <lightning-combobox name="address" label="Select Specialization" options={specializationOptions} value={selectedSpecialization} onchange={handleChange}></lightning-combobox> -->
                    <template for:each={doctors} for:item="doctor">
                        <div key={doctor.Id} class="doctor-row">
                            <p>{doctor.Member.Name}</p>
                            <lightning-button label="Book Appointment" data-id={doctor.Member.Id} data-name={doctor.Member.Name} onclick={bookAppointment}></lightning-button>
                        </div>
                        <!-- <p key={doctor}>{doctor.Practitioner.Name}</p> -->
                    </template>
                    <template if:true={showDate}>
                        <lightning-input label="Select appointment date" type="date" value={selectedDate} onchange={dateSelection} required></lightning-input>
                        <lightning-combobox name="workType" label="Select Work Type" options={workTypeOptions} value={workType} onchange={handleWorkTypeChange} required></lightning-combobox>
                        <div style="padding: 10px; text-align:center;">
                            <lightning-button label="Get Available Slots" onclick={getAvailableSlots}></lightning-button>
                        </div>

                        <template if:true={displaySlots}>
                            <div class="slot-container">
                                <template for:each={availableSlots} for:item="item">
                                    <div key={item} class={item.slotClass} data-slot={item.slot} data-class={item.slotClass} onclick={handleSelect}>{item.slot}</div>
                                </template>
                            </div>
                        </template>
                        <template if:true={isBookAppointment}>
                            <div style="text-align: center; padding-top:10px;"><lightning-button label="Book Appointment" onclick={bookServiceAppointment}></lightning-button></div>
                        </template>
                    </template>
                </div>  
            </div>
        </div>
    </template>

    <lightning-card>
        <template for:each={carePlans} for:item="carePlan">
            <div key={carePlan.Id} style="display: flex; padding:10px;">
                <div style="flex: 1;">
                    <p><b>Care Plan :</b> {carePlan.Name}</p>
                    <p><b>Status :</b> {carePlan.Status}</p>
                </div>
                <div>
                    <lightning-button label="Care Team" onclick={careTeam} data-id={carePlan.CaseId}></lightning-button>
                </div>
            </div>   
        </template>
    </lightning-card>
</template>
